name: Trigger Frontend Contract Tests

on:
  push:
    branches:
      - main
      - "feature/**"
  pull_request:
    branches:
      - main

jobs:
  trigger:
    runs-on: ubuntu-latest

    steps:
      - name: Trigger frontend contract tests
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.FRONTEND_REPO_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/AlbertZheng123/team-task-board-web/dispatches \
            -d '{
              "event_type": "backend_pr_updated",
              "client_payload": {
                "backend_repo": "${{ github.repository }}",
                "backend_sha": "${{ github.sha }}",
                "backend_branch": "${{ github.ref_name }}"
              }
            }'
